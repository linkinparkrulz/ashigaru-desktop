name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact-name: Windows
          - os: ubuntu-22.04
            artifact-name: Linux
          - os: macos-latest
            artifact-name: macOS-arm64
          - os: macos-15-intel
            artifact-name: macOS-x64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21.0.7
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21.0.7

      - name: Extract version (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" | Out-File -Append $env:GITHUB_ENV

      - name: Extract version (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build with Gradle (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: .\gradlew.bat jpackage

      - name: Build with Gradle (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        run: ./gradlew jpackage

      - name: Package zip distribution (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: .\gradlew.bat packageZipDistribution

      - name: Package zip distribution (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: ./gradlew packageZipDistribution

      - name: Package tar distribution (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: ./gradlew packageTarDistribution

      - name: Rename macOS DMG (arm64)
        if: ${{ matrix.artifact-name == 'macOS-arm64' }}
        run: mv build/jpackage/*.dmg build/jpackage/Ashigaru-${VERSION}-aarch64.dmg

      - name: Rename macOS DMG (x64)
        if: ${{ matrix.artifact-name == 'macOS-x64' }}
        run: mv build/jpackage/*.dmg build/jpackage/Ashigaru-${VERSION}-x86_64.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact-name }}
          path: |
            build/distributions/*
            build/jpackage/*.dmg
            build/jpackage/*.msi
            build/jpackage/*.exe
            build/jpackage/*.deb
            build/jpackage/*.rpm

      - name: Headless build with Gradle
        if: ${{ runner.os == 'Linux' }}
        run: ./gradlew -Djava.awt.headless=true clean jpackage

      - name: Package headless tar distribution
        if: ${{ runner.os == 'Linux' }}
        run: ./gradlew -Djava.awt.headless=true packageTarDistribution

      - name: Rename headless artifacts
        if: ${{ runner.os == 'Linux' }}
        run: for f in build/jpackage/ashigaru*; do mv -v "$f" "${f/ashigaru/ashigaru-server}"; done

      - name: Upload headless artifacts
        if: ${{ runner.os == 'Linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact-name }}-Headless
          path: |
            build/jpackage/*
            !build/jpackage/Ashigaru/
            build/distributions/*

  validate-macos:
    needs: build
    runs-on: macos-latest

    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-macOS-*
          path: artifacts
          merge-multiple: true

      - name: Validate DMG bundle structure
        run: |
          set -euo pipefail
          validate_app() {
            local app="$1" label="$2"
            local plist="$app/Contents/Info.plist"
            echo "=== $label ==="
            [ -f "$plist" ] || { echo "FAIL: Info.plist missing"; exit 1; }
            EXEC=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$plist")
            echo "  CFBundleExecutable: $EXEC"
            [ -f "$app/Contents/MacOS/$EXEC" ] \
              || { echo "FAIL: Contents/MacOS/$EXEC not found"; exit 1; }
            MIN=$(/usr/libexec/PlistBuddy -c "Print LSMinimumSystemVersion" "$plist")
            echo "  LSMinimumSystemVersion: $MIN"
            [ "$MIN" = "11.0" ] || { echo "FAIL: expected 11.0, got $MIN"; exit 1; }
            codesign --verify --deep --strict --verbose=2 "$app" \
              || { echo "FAIL: codesign verify failed"; exit 1; }
            echo "  PASS"
          }
          for dmg in artifacts/Ashigaru-*.dmg; do
            [ -f "$dmg" ] || continue
            mnt="/Volumes/AshigaruCheck-$(basename "$dmg" .dmg)"
            hdiutil attach "$dmg" -mountpoint "$mnt" -nobrowse -quiet
            validate_app "$mnt/Ashigaru.app" "$(basename "$dmg")"
            hdiutil detach "$mnt" -quiet
          done

      - name: Validate ZIP bundle structure
        run: |
          set -euo pipefail
          for zip in artifacts/Ashigaru-*-osx-*.zip; do
            [ -f "$zip" ] || continue
            echo "=== $(basename "$zip") ==="
            unzip -l "$zip" | grep -q "Ashigaru\.app/" \
              || { echo "FAIL: no Ashigaru.app/ in ZIP"; exit 1; }
            tmp=$(mktemp -d)
            unzip -q "$zip" -d "$tmp"
            plist="$tmp/Ashigaru.app/Contents/Info.plist"
            [ -f "$plist" ] || { echo "FAIL: Info.plist missing in ZIP"; exit 1; }
            EXEC=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$plist")
            [ -f "$tmp/Ashigaru.app/Contents/MacOS/$EXEC" ] \
              || { echo "FAIL: Contents/MacOS/$EXEC missing in ZIP"; exit 1; }
            rm -rf "$tmp"
            echo "  PASS"
          done

  release:
    needs: [build, validate-macos]
    runs-on: ubuntu-22.04

    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          find . -maxdepth 1 -type f | sort | xargs sha256sum > SHA256SUMS

      - name: Generate MESSAGE.txt
        run: |
          cd release-assets
          SUMS_HASH=$(sha256sum SHA256SUMS | awk '{print $1}')
          printf '%s\n' \
            "Ashigaru release attestation" \
            "Repo: github.com/linkinparkrulz/ashigaru-desktop" \
            "Tag: ${GITHUB_REF_NAME}" \
            "Commit: ${GITHUB_SHA}" \
            "SHA256(SHA256SUMS): ${SUMS_HASH}" \
            > MESSAGE.txt

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Ashigaru ${{ env.VERSION }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release-assets/**
